<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<title>Catalogue Tarifs — Centre Esthétique Ecusson</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf6f0;
  --ivory: #f2ebe0;
  --gold: #b8924a;
  --gold2: #d4aa6a;
  --gold-pale: #f0e4cc;
  --dark: #1c1410;
  --brown: #4a3828;
  --taupe: #8a7060;
  --white: #ffffff;
  --shadow: rgba(28,20,16,0.18);
}

- { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: #2a1e14;
color-scheme: only light;
font-family: ‘Jost’, sans-serif;
}

/* ── SCENE ── */
#scene {
position: fixed; inset: 0;
display: flex; align-items: center; justify-content: center;
background: radial-gradient(ellipse at 50% 40%, #3a2a1c 0%, #1a1008 100%);
perspective: 2000px;
}

/* ── BOOK CONTAINER ── */
#book-wrap {
position: relative;
width: min(88vw, calc(88vh * 0.65));
height: min(88vh, calc(88vw / 0.65));
transform-style: preserve-3d;
}

/* ── BOOK SHADOW ── */
#book-wrap::after {
content: ‘’;
position: absolute;
bottom: -4%;
left: 5%; right: 5%;
height: 6%;
background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
filter: blur(8px);
}

/* ── BOOK ── */
#book {
position: relative;
width: 100%; height: 100%;
transform-style: preserve-3d;
}

/* ── PAGES ── */
.page {
position: absolute;
top: 0; right: 0;
width: 100%; height: 100%;
transform-origin: left center;
transform-style: preserve-3d;
transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1.000);
cursor: pointer;
}

.page.turning { z-index: 10; }
.page.turned { transform: rotateY(-180deg); }

/* Faces avant/arrière */
.page-front, .page-back {
position: absolute;
inset: 0;
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
border-radius: 2px 6px 6px 2px;
overflow: hidden;
box-shadow: 4px 0 20px var(–shadow), inset -2px 0 8px rgba(0,0,0,0.08);
}

.page-back {
transform: rotateY(180deg);
border-radius: 6px 2px 2px 6px;
box-shadow: -4px 0 20px var(–shadow), inset 2px 0 8px rgba(0,0,0,0.06);
}

/* Reliure ombre */
.page-front::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 18px;
background: linear-gradient(to right, rgba(0,0,0,0.08), transparent);
z-index: 2;
}

/* ── COUVERTE ── */
.cover-page {
background: linear-gradient(145deg, #2a1e14 0%, #1c1208 50%, #2e2010 100%);
display: flex; flex-direction: column;
align-items: center; justify-content: center;
padding: 8%;
position: relative;
overflow: hidden;
}

.cover-page::before {
content: ‘’;
position: absolute; inset: 0;
background:
radial-gradient(ellipse at 20% 20%, rgba(184,146,74,0.12) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(184,146,74,0.08) 0%, transparent 40%);
}

.cover-border {
position: absolute;
inset: 4%;
border: 1px solid rgba(184,146,74,0.25);
pointer-events: none;
}
.cover-border::before {
content: ‘’;
position: absolute;
inset: 4px;
border: 1px solid rgba(184,146,74,0.12);
}

.cover-ornament {
width: 60%;
margin-bottom: 6%;
opacity: 0.9;
}

.cover-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: clamp(1.4rem, 5vw, 2.4rem);
font-weight: 300;
color: var(–gold2);
text-align: center;
letter-spacing: 0.15em;
text-transform: uppercase;
line-height: 1.2;
position: relative; z-index: 2;
}

.cover-subtitle {
font-size: clamp(0.45rem, 1.3vw, 0.6rem);
letter-spacing: 0.5em;
text-transform: uppercase;
color: rgba(212,170,106,0.6);
margin-top: 3%;
position: relative; z-index: 2;
}

.cover-divider {
width: 40px; height: 1px;
background: linear-gradient(to right, transparent, var(–gold), transparent);
margin: 4% auto;
position: relative; z-index: 2;
}

.cover-hint {
position: absolute;
bottom: 8%;
font-size: clamp(0.42rem, 1.1vw, 0.54rem);
letter-spacing: 0.3em;
text-transform: uppercase;
color: rgba(184,146,74,0.4);
display: flex; align-items: center; gap: 8px;
z-index: 2;
animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { opacity: 0.4; }
50% { opacity: 0.9; }
}

/* ── PAGES INTÉRIEURES ── */
.inner-page {
background: var(–cream);
padding: 6% 7%;
display: flex;
flex-direction: column;
position: relative;
}

.inner-page::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 4px;
background: linear-gradient(to right, transparent, rgba(184,146,74,0.15), transparent);
}

/* Numéro de page */
.page-num {
position: absolute;
bottom: 4%;
font-size: clamp(0.4rem, 1vw, 0.52rem);
letter-spacing: 0.3em;
color: rgba(184,146,74,0.4);
font-family: ‘Cormorant Garamond’, serif;
}
.page-num-left { left: 6%; }
.page-num-right { right: 6%; }

/* Header de page */
.page-cat-label {
font-size: clamp(0.42rem, 1.1vw, 0.54rem);
letter-spacing: 0.45em;
text-transform: uppercase;
color: var(–gold);
margin-bottom: 2%;
font-weight: 400;
}

.page-cat-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: clamp(1.4rem, 5vw, 2.2rem);
font-weight: 300;
color: var(–dark);
line-height: 1;
margin-bottom: 4%;
padding-bottom: 3%;
border-bottom: 1px solid rgba(184,146,74,0.2);
}
.page-cat-title em { font-style: italic; color: var(–gold); }

/* Tableau tarifs */
.tarif-table {
width: 100%;
border-collapse: collapse;
flex: 1;
}

.tarif-table tr {
border-bottom: 1px solid rgba(74,56,40,0.07);
transition: background 0.15s;
}
.tarif-table tr:last-child { border-bottom: none; }
.tarif-table tr:nth-child(even) td { background: rgba(242,235,224,0.5); }

.tarif-table td {
padding: clamp(5px, 1.3vw, 9px) clamp(4px, 1vw, 7px);
font-size: clamp(0.52rem, 1.3vw, 0.66rem);
font-weight: 300;
color: var(–dark);
vertical-align: middle;
line-height: 1.4;
}

.tarif-table td:last-child {
text-align: right;
font-weight: 500;
color: var(–gold);
white-space: nowrap;
font-family: ‘Cormorant Garamond’, serif;
font-size: clamp(0.65rem, 1.7vw, 0.85rem);
padding-left: 4%;
}

.tarif-sub {
font-family: ‘Cormorant Garamond’, serif;
font-size: clamp(0.9rem, 3vw, 1.3rem);
font-weight: 400;
color: var(–brown);
margin: 3% 0 2%;
padding-bottom: 1.5%;
border-bottom: 1px solid rgba(184,146,74,0.1);
}

/* Décoration coin */
.corner-deco {
position: absolute;
width: 30px; height: 30px;
opacity: 0.2;
}
.corner-tl { top: 3%; left: 3%; border-top: 1px solid var(–gold); border-left: 1px solid var(–gold); }
.corner-br { bottom: 3%; right: 3%; border-bottom: 1px solid var(–gold); border-right: 1px solid var(–gold); }

/* ── NAVIGATION ── */
#nav-prev, #nav-next {
position: fixed;
top: 50%;
transform: translateY(-50%);
background: rgba(184,146,74,0.15);
border: 1px solid rgba(184,146,74,0.3);
color: var(–gold2);
font-size: clamp(1rem, 3vw, 1.5rem);
width: clamp(36px, 6vw, 50px);
height: clamp(36px, 6vw, 50px);
display: flex; align-items: center; justify-content: center;
cursor: pointer;
transition: all 0.25s;
z-index: 100;
backdrop-filter: blur(4px);
border-radius: 2px;
}
#nav-prev { left: 2%; }
#nav-next { right: 2%; }
#nav-prev:hover, #nav-next:hover {
background: rgba(184,146,74,0.35);
border-color: var(–gold);
}

/* ── CLOSE ── */
#close-btn {
position: fixed;
top: 3%; right: 3%;
background: rgba(184,146,74,0.15);
border: 1px solid rgba(184,146,74,0.3);
color: var(–gold2);
font-size: clamp(0.5rem, 1.3vw, 0.65rem);
letter-spacing: 0.25em;
text-transform: uppercase;
padding: 8px 16px;
cursor: pointer;
z-index: 100;
font-family: ‘Jost’, sans-serif;
transition: all 0.25s;
backdrop-filter: blur(4px);
}
#close-btn:hover { background: rgba(184,146,74,0.3); }

/* ── PROGRESS ── */
#progress {
position: fixed;
bottom: 4%;
left: 50%; transform: translateX(-50%);
display: flex; gap: 8px; z-index: 100;
}
.prog-dot {
width: 20px; height: 2px;
background: rgba(184,146,74,0.25);
transition: all 0.3s; cursor: pointer;
}
.prog-dot.active { background: var(–gold2); width: 32px; }

/* ── PAGE COUNTER ── */
#page-counter {
position: fixed;
bottom: 4%; right: 3%;
font-size: clamp(0.42rem, 1.1vw, 0.54rem);
letter-spacing: 0.3em;
color: rgba(184,146,74,0.5);
font-family: ‘Cormorant Garamond’, serif;
z-index: 100;
}

/* ── 4TH COVER (back) ── */
.back-cover {
background: linear-gradient(145deg, #1c1208 0%, #2a1e14 100%);
display: flex; flex-direction: column;
align-items: center; justify-content: center;
padding: 10%;
position: relative;
}
.back-cover::before {
content: ‘’;
position: absolute; inset: 0;
background: radial-gradient(ellipse at 50% 50%, rgba(184,146,74,0.06) 0%, transparent 70%);
}
.back-cover-logo {
font-family: ‘Cormorant Garamond’, serif;
font-size: clamp(1rem, 3.5vw, 1.6rem);
font-weight: 300;
color: rgba(212,170,106,0.7);
letter-spacing: 0.2em;
text-transform: uppercase;
text-align: center;
position: relative; z-index: 2;
}
.back-cover-url {
font-size: clamp(0.42rem, 1.1vw, 0.54rem);
letter-spacing: 0.35em;
color: rgba(184,146,74,0.4);
margin-top: 4%;
position: relative; z-index: 2;
}

/* Touch swipe */
#book-wrap { touch-action: pan-y; }
</style>

</head>

let currentPage = 0;

// ── BUILD DOM ──
const book = document.getElementById('book');

function buildPageDOM(pageData, index) {
  const el = document.createElement('div');
  el.className = 'page';
  el.dataset.index = index;
  el.style.zIndex = totalPages - index;

  const front = document.createElement('div');
  front.className = 'page-front';
  const back = document.createElement('div');
  back.className = 'page-back';

      <div class="cover-hint">
        <span>Ouvrir</span>
        <span>→</span>
      </div>`;

    // Back of cover = first content page summary
    back.className += ' inner-page';
    back.innerHTML = `
      <div class="corner-deco corner-tl"></div>
      <div class="corner-deco corner-br"></div>
      <div class="page-cat-label">Sommaire</div>
      <div class="page-cat-title">Nos <em>Prestations</em></div>
      <table class="tarif-table">
        ${catalogue.map((c, i) => `<tr><td>${i+1}. ${c.title}</td><td style="color:var(--taupe);font-family:'Jost',sans-serif;font-size:0.6rem;letter-spacing:0.2em">${c.label.toUpperCase()}</td></tr>`).join('')}
      </table>
      <div class="page-num page-num-right">Ecusson · Tarifs 2024</div>`;

  } else if (pageData.type === 'backcover') {
    front.className += ' inner-page';
    front.innerHTML = `
      <div class="corner-deco corner-tl"></div>
      <div class="corner-deco corner-br"></div>
      <div class="page-cat-label">Rendez-vous</div>
      <div class="page-cat-title">Nous <em>Contacter</em></div>
      <table class="tarif-table">
        <tr><td>📍 Montpellier</td><td>Centre historique — Quartier Écusson</td></tr>
        <tr><td>📍 Uzès</td><td>12 Rue Pelisserie, 30700 Uzès</td></tr>
        <tr><td>📞 Uzès</td><td>09 87 32 72 97</td></tr>
        <tr><td>🌐 Site</td><td>centreesthetiqueecusson.com</td></tr>
        <tr><td>📅 Réservation</td><td>doctolib.fr</td></tr>
      </table>
      <div class="page-num page-num-right">Fermer →</div>`;

    back.className += ' back-cover';
    back.innerHTML = `
      <div class="back-cover-logo">Centre Esthétique<br>& Laser</div>
      <div style="width:40px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:5% auto;opacity:0.4"></div>
      <div class="back-cover-url">centreesthetiqueecusson.com</div>`;

  } else {
    // Content page
    const { cat, pg } = pageData;
    front.className += ' inner-page';
    front.innerHTML = buildContentHTML(cat, pg, index);

    // Back = next page if exists
    const nextPg = allPages[index + 1];
    if (nextPg && nextPg.type === 'content') {
      back.className += ' inner-page';
      back.innerHTML = buildContentHTML(nextPg.cat, nextPg.pg, index + 1);
    } else if (nextPg && nextPg.type === 'backcover') {
      back.className += ' inner-page';
      back.innerHTML = `
        <div class="corner-deco corner-tl"></div>
        <div class="corner-deco corner-br"></div>
        <div class="page-cat-label">Rendez-vous</div>
        <div class="page-cat-title">Nous <em>Contacter</em></div>
        <table class="tarif-table">
          <tr><td>📍 Montpellier</td><td>Centre historique — Quartier Écusson</td></tr>
          <tr><td>📍 Uzès</td><td>12 Rue Pelisserie, 30700 Uzès</td></tr>
          <tr><td>📞 Uzès</td><td>09 87 32 72 97</td></tr>
          <tr><td>🌐 Site</td><td>centreesthetiqueecusson.com</td></tr>
          <tr><td>📅 Réservation</td><td>doctolib.fr</td></tr>
        </table>`;
    } else {
      back.className += ' inner-page';
      back.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;opacity:0.2">
        <div style="font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--gold)">✦</div></div>`;
    }
  }

  el.appendChild(front);
  el.appendChild(back);
  return el;
}

function buildContentHTML(cat, pg, idx) {
  let html = `
    <div class="corner-deco corner-tl"></div>
    <div class="corner-deco corner-br"></div>
    <div class="page-cat-label">${cat.label}</div>
    <div class="page-cat-title">${cat.title.replace(/(\w+)$/, '<em>$1</em>')}</div>`;

  if (pg.subtitle) {
    html += `<div class="tarif-sub">${pg.subtitle}</div>`;
  }
  html += `<table class="tarif-table">
    ${pg.rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}
  </table>`;

  if (pg.subtitle2) {
    html += `<div class="tarif-sub" style="margin-top:4%">${pg.subtitle2}</div>`;
    html += `<table class="tarif-table">
      ${pg.rows2.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}
    </table>`;
  }

  html += `<div class="page-num page-num-right">${idx}</div>`;
  return html;
}

// Build all pages
allPages.forEach((pg, i) => {
  const el = buildPageDOM(pg, i);
  book.appendChild(el);
});

// ── NAVIGATION ──
function goToPage(targetPage) {
  if (isAnimating || targetPage === currentPage) return;
  if (targetPage < 0 || targetPage >= totalPages) return;
  isAnimating = true;

  const pages = document.querySelectorAll('.page');

  if (targetPage > currentPage) {
    // Tourner vers l'avant
    for (let i = currentPage; i < targetPage; i++) {
      const page = pages[i];
      setTimeout(() => {
        page.classList.add('turning', 'turned');
        page.style.zIndex = totalPages + i;
      }, (i - currentPage) * 100);
    }
  } else {
    // Tourner vers l'arrière
    for (let i = currentPage - 1; i >= targetPage; i--) {
      const page = pages[i];
      setTimeout(() => {
        page.classList.add('turning');
        page.classList.remove('turned');
        page.style.zIndex = totalPages - i;
      }, (currentPage - 1 - i) * 100);
    }
  }

  setTimeout(() => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('turning'));
    currentPage = targetPage;
    isAnimating = false;
    updateUI();
  }, 950 + Math.abs(targetPage - currentPage) * 100);

  updateUI();
}

function nextPage() { goToPage(Math.min(currentPage + 1, totalPages - 1)); }
function prevPage() { goToPage(Math.max(currentPage - 1, 0)); }

function updateUI() {
  // Progress dots
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  allPages.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'prog-dot' + (i === currentPage ? ' active' : '');
    d.onclick = () => goToPage(i);
    prog.appendChild(d);
  });

  // Counter
  document.getElementById('page-counter').textContent = `${currentPage + 1} / ${totalPages}`;
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
  if (e.key === 'Escape') window.close();
});

// Touch swipe
let touchStartX = 0;
document.getElementById('book-wrap').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
});
document.getElementById('book-wrap').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx < -50) nextPage();
  if (dx > 50) prevPage();
});

// Click on book
document.getElementById('book-wrap').addEventListener('click', e => {
  const rect = document.getElementById('book-wrap').getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x > rect.width / 2) nextPage();
  else prevPage();
});

updateUI();
</script>
