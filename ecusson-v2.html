<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Centre Esthétique Écusson — Montpellier · Uzès</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
/* Centre Esthétique Écusson — v2 — bleu nuit & or */

:root {
  --bg: #0B1220;
  --bg-2: #0F172A;
  --bg-3: #141E36;
  --ink: #F4EFE6;
  --ink-mute: #A8B0C2;
  --ink-soft: #6B7387;
  --gold: #C7A037;
  --gold-2: #E8C77A;
  --gold-deep: #8B7148;
  --line: rgba(199, 160, 55, 0.22);
  --line-soft: rgba(255, 255, 255, 0.06);

  --serif: "Cormorant Garamond", "Didot", Georgia, serif;
  --sans: "Inter Tight", "Helvetica Neue", system-ui, -apple-system, sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: var(--bg-2);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body { cursor: none; }
@media (max-width: 820px) { body { cursor: auto; } .cursor-dot, .cursor-ring { display: none !important; } }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: none; border: 0; background: transparent; color: inherit; }
img { display: block; max-width: 100%; }
::selection { background: var(--gold); color: var(--bg); }

/* Cursor */
.cursor-dot, .cursor-ring { position: fixed; top:0; left:0; pointer-events: none; z-index: 9999; mix-blend-mode: difference; will-change: transform; }
.cursor-dot { width: 6px; height: 6px; background: var(--gold-2); border-radius: 50%; transform: translate(-50%, -50%); transition: width .25s var(--ease), height .25s var(--ease); }
.cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(232,199,122,0.5); border-radius: 50%; transform: translate(-50%, -50%); transition: width .35s var(--ease), height .35s var(--ease), border-color .35s var(--ease), background .35s var(--ease); }
.cursor-ring.hover { width: 80px; height: 80px; border-color: var(--gold-2); background: rgba(199,160,55,0.18); backdrop-filter: blur(4px); mix-blend-mode: normal; }
.cursor-dot.hover { width: 0; height: 0; }

/* Typo */
.serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
.eyebrow { font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold); }
.eyebrow.ico::before { content: ""; display: inline-block; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; vertical-align: middle; margin-right: 12px; margin-bottom: 2px; box-shadow: 0 0 12px var(--gold); }

.h-display { font-family: var(--sans); font-weight: 200; font-size: clamp(48px, 8.5vw, 128px); line-height: 0.95; letter-spacing: -0.025em; text-transform: uppercase; }
.h-display em { font-family: var(--serif); font-weight: 500; font-style: italic; color: var(--gold); text-transform: none; letter-spacing: -0.015em; display: inline-block; }
.h-display .gold-grad { background: linear-gradient(135deg, var(--gold-2) 0%, var(--gold) 50%, var(--ink) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 600; }

.h-section { font-family: var(--sans); font-weight: 200; font-size: clamp(40px, 6vw, 84px); line-height: 1.0; letter-spacing: -0.02em; text-transform: uppercase; }
.h-section em { font-family: var(--serif); font-weight: 500; font-style: italic; color: var(--gold); text-transform: none; letter-spacing: -0.01em; }
.lede { font-family: var(--sans); font-weight: 300; font-size: clamp(17px, 1.4vw, 22px); line-height: 1.55; color: var(--ink-mute); }

/* Layout */
.wrap { width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 48px; }
@media (max-width: 720px) { .wrap { padding: 0 24px; } }
section { position: relative; }

/* Top ticker bar */
.top-ticker {
  background: var(--bg);
  padding: 11px 0;
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-mute);
  border-bottom: 1px solid var(--line);
  overflow: hidden;
  position: relative;
  z-index: 60;
}
.tk-track { display: flex; animation: tk 60s linear infinite; white-space: nowrap; }
.tk-track > span { display: flex; align-items: center; gap: 40px; padding-right: 40px; }
.tk-track .dot { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; flex-shrink: 0; }
.tk-track a:hover { color: var(--gold); }
@keyframes tk { to { transform: translateX(-50%); } }

/* Nav */
.nav-wrap { position: sticky; top: 0; z-index: 50; }
.nav {
  margin: 16px 24px 0;
  background: rgba(15, 23, 42, 0.72);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  transition: padding .4s var(--ease), margin .4s var(--ease);
}
.nav.scrolled { padding: 14px 24px; margin-top: 12px; }
@media (max-width: 720px) { .nav { margin: 12px 16px 0; padding: 14px 18px; } }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark-icon {
  width: 32px; height: 32px;
  border: 1px solid var(--gold);
  border-radius: 50%;
  display: grid; place-items: center;
  color: var(--gold);
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  position: relative;
}
.logo-mark-icon::after {
  content: "";
  position: absolute;
  inset: -4px;
  border: 1px solid rgba(199,160,55,0.2);
  border-radius: 50%;
  animation: pulse-ring 3s var(--ease) infinite;
}
@keyframes pulse-ring {
  0% { transform: scale(0.85); opacity: 0.8; }
  100% { transform: scale(1.4); opacity: 0; }
}
.logo-text { line-height: 1.2; }
.logo-name {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink);
  display: block;
}
.logo-sub {
  font-size: 9px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 2px;
  display: block;
}
.nav-menu { display: flex; gap: 32px; list-style: none; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; }
.nav-menu a { color: var(--ink); transition: color .3s var(--ease); position: relative; padding: 4px 0; }
.nav-menu a:hover { color: var(--gold); }
.nav-menu a::after { content: ""; position: absolute; left: 0; bottom: -4px; width: 0; height: 1px; background: var(--gold); transition: width .4s var(--ease); }
.nav-menu a:hover::after { width: 100%; }
@media (max-width: 980px) { .nav-menu { display: none; } }

.nav-cta {
  position: relative;
  overflow: hidden;
  font-size: 11px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 14px 22px;
  border: 1px solid var(--gold);
  background: rgba(199, 160, 55, 0.1);
  color: var(--ink);
  border-radius: 4px;
  transition: color .5s var(--ease);
}
.nav-cta::before { content: ""; position: absolute; inset: 0; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform .5s var(--ease); }
.nav-cta:hover { color: var(--bg); }
.nav-cta:hover::before { transform: scaleX(1); }
.nav-cta span { position: relative; z-index: 1; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 14px; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 600; padding: 18px 32px; border-radius: 4px; transition: all .4s var(--ease); position: relative; overflow: hidden; }
.btn-gold { background: var(--gold); color: var(--bg); border: 1px solid var(--gold); }
.btn-gold:hover { background: var(--gold-2); border-color: var(--gold-2); transform: translateY(-1px); box-shadow: 0 18px 40px -12px rgba(232, 199, 122, 0.5); }
.btn-ghost { border: 1px solid var(--gold); color: var(--gold); position: relative; }
.btn-ghost::before { content: ""; position: absolute; inset: 0; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform .5s var(--ease); }
.btn-ghost:hover { color: var(--bg); }
.btn-ghost:hover::before { transform: scaleX(1); }
.btn-ghost span { position: relative; z-index: 1; }
.btn-arrow { width: 14px; height: 1px; background: currentColor; position: relative; transition: width .3s var(--ease); }
.btn-arrow::after { content: ""; position: absolute; right: 0; top: -3px; width: 7px; height: 7px; border-top: 1px solid currentColor; border-right: 1px solid currentColor; transform: rotate(45deg); }
.btn:hover .btn-arrow { width: 22px; }

/* Reveal — content visible by default, animation layered on intersection */
.reveal.pending { opacity: 0; transform: translateY(40px); }
.reveal.in { animation: revealUp 1.1s var(--ease) both; }
.reveal-stagger.pending > * { opacity: 0; transform: translateY(28px); }
.reveal-stagger.in > * { animation: revealUp .9s var(--ease) both; }
.reveal-stagger.in > *:nth-child(1) { animation-delay: .05s; }
.reveal-stagger.in > *:nth-child(2) { animation-delay: .15s; }
.reveal-stagger.in > *:nth-child(3) { animation-delay: .25s; }
.reveal-stagger.in > *:nth-child(4) { animation-delay: .35s; }
.reveal-stagger.in > *:nth-child(5) { animation-delay: .45s; }
.reveal-stagger.in > *:nth-child(6) { animation-delay: .55s; }
@keyframes revealUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.clip-img.pending { clip-path: inset(100% 0 0 0); }
.clip-img.in { animation: clipReveal 1.3s var(--ease) both; }
@keyframes clipReveal {
  from { clip-path: inset(100% 0 0 0); }
  to { clip-path: inset(0 0 0 0); }
}

/* Hero */
.hero {
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: var(--bg-2);
  padding: 80px 0 100px;
}
.hero-bg-canvas { position: absolute; inset: 0; z-index: 0; }
.hero-bg-canvas canvas { width: 100%; height: 100%; display: block; }
.hero-bg-canvas::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(199,160,55,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(33, 71, 120, 0.4) 0%, transparent 60%),
    linear-gradient(180deg, rgba(11,18,32,0.6) 0%, rgba(11,18,32,0) 30%, rgba(11,18,32,0.85) 100%);
  pointer-events: none;
}
.hero-grid {
  position: absolute;
  inset: 0;
  background-size: 120px 120px;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
  pointer-events: none;
  z-index: 1;
}
.hero-content { position: relative; z-index: 2; max-width: 1200px; padding: 0 32px; }
.hero h1 { margin: 32px 0; }
.hero h1 .line { display: block; overflow: hidden; }
.hero h1 .line span { display: inline-block; }
.hero-lede { max-width: 760px; margin: 40px auto 0; }
.hero-quote {
  display: inline-block;
  margin-top: 36px;
  padding: 18px 28px;
  border-left: 2px solid var(--gold);
  background: linear-gradient(90deg, rgba(199,160,55,0.12), transparent);
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(15px, 1.15vw, 18px);
  color: var(--gold-2);
  text-align: left;
  max-width: 600px;
}
.hero-actions { margin-top: 56px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.scroll-hint { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--ink-soft); display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 3; }
.scroll-hint::after { content: ""; width: 1px; height: 56px; background: linear-gradient(to bottom, var(--gold) 50%, transparent 50%); background-size: 1px 8px; animation: scroll-pulse 2.4s var(--ease) infinite; }
@keyframes scroll-pulse { 0% { background-position: 0 -56px; opacity: 0; } 30% { opacity: 1; } 100% { background-position: 0 56px; opacity: 0; } }

/* Section frame */
.section { padding: 140px 0; position: relative; }
.section-grid::before {
  content: ""; position: absolute; inset: 0;
  background-size: 120px 120px;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
  pointer-events: none;
}
.section-head-center { text-align: center; margin-bottom: 80px; }
.section-head-center .eyebrow { display: inline-block; margin-bottom: 24px; padding: 6px 16px; border: 1px solid var(--line); border-radius: 999px; }

/* Centres */
.centres-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  position: relative;
}
@media (max-width: 980px) { .centres-grid { grid-template-columns: 1fr; gap: 40px; } }
.centre-card { display: flex; flex-direction: column; gap: 32px; }
.centre-card.shifted { margin-top: 80px; }
@media (max-width: 980px) { .centre-card.shifted { margin-top: 0; } }
.centre-img-wrap {
  position: relative;
  aspect-ratio: 4/5;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--line-soft);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}
.centre-img-wrap img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.08); transition: transform 1.2s var(--ease); }
.centre-card:hover .centre-img-wrap img { transform: scale(1.0); }
.centre-img-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(11, 18, 32, 0.4) 0%, rgba(11, 18, 32, 0.0) 50%, rgba(11, 18, 32, 0.85) 100%);
  z-index: 1;
}
.centre-pill {
  position: absolute;
  top: 24px; left: 24px;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(16px);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
}
.centre-pill .ping { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); position: relative; }
.centre-pill .ping::after { content: ""; position: absolute; inset: 0; border-radius: 50%; background: var(--gold); animation: ping 1.6s var(--ease) infinite; }
@keyframes ping { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(2.6); opacity: 0; } }

.centre-body { padding-left: 28px; position: relative; }
.centre-body::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, var(--gold), rgba(199,160,55,0.15) 50%, transparent);
}
.centre-eyebrow { font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-mute); font-weight: 300; }
.centre-name { font-family: var(--sans); font-weight: 200; font-size: clamp(36px, 4.5vw, 56px); color: var(--ink); letter-spacing: -0.015em; margin: 8px 0 24px; line-height: 1; text-transform: uppercase; }
.centre-name em { font-family: var(--serif); font-weight: 500; font-style: italic; color: var(--gold); text-transform: none; letter-spacing: -0.005em; }
.centre-desc { color: var(--ink-mute); font-size: 16px; line-height: 1.7; margin-bottom: 16px; max-width: 540px; }
.centre-meta { font-family: var(--serif); font-style: italic; color: var(--ink-soft); font-size: 16px; line-height: 1.6; margin-bottom: 28px; max-width: 540px; }
.centre-link { display: inline-flex; align-items: center; gap: 12px; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 700; color: var(--gold); transition: gap .4s var(--ease); }
.centre-link:hover { gap: 18px; color: var(--ink); }

/* Bento Soins */
.bento {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 360px;
  gap: 20px;
}
@media (max-width: 980px) { .bento { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .bento { grid-template-columns: 1fr; grid-auto-rows: 320px; } }
.bento-card {
  position: relative;
  border-radius: 24px;
  background: rgba(15, 23, 42, 0.72);
  backdrop-filter: blur(20px);
  border: 1px solid var(--line-soft);
  padding: 32px;
  overflow: hidden;
  transition: border-color .5s var(--ease), transform .5s var(--ease);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.bento-card:hover { border-color: var(--gold); transform: translateY(-2px); }
.bento-card.span-2 { grid-row: span 2; }
@media (max-width: 600px) { .bento-card.span-2 { grid-row: span 1; } }
.bento-card.featured {
  background: linear-gradient(135deg, rgba(199,160,55,0.15), rgba(15,23,42,0.85));
  border-color: var(--line);
}
.bento-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0.18;
  filter: grayscale(1);
  transition: all 0.7s var(--ease);
  z-index: 0;
}
.bento-card:hover .bento-bg { opacity: 0.35; filter: grayscale(0); transform: scale(1.04); }
.bento-content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }
.bento-icon {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 1px solid var(--line);
  background: rgba(11, 18, 32, 0.5);
  backdrop-filter: blur(8px);
  display: grid; place-items: center;
  margin-bottom: 28px;
  color: var(--gold);
}
.bento-card h3 {
  font-family: var(--sans);
  font-weight: 200;
  font-size: clamp(28px, 2.6vw, 38px);
  color: var(--ink);
  border-bottom: 1px solid var(--line-soft);
  padding-bottom: 18px;
  margin-bottom: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  letter-spacing: -0.01em;
}
.bento-card.featured h3 { color: var(--gold); border-bottom-color: var(--line); }
.bento-list { list-style: none; display: flex; flex-direction: column; gap: 14px; flex: 1; }
.bento-list a {
  display: flex; align-items: center; gap: 12px;
  font-size: 14px;
  color: var(--ink-mute);
  transition: color .3s var(--ease), transform .3s var(--ease);
  line-height: 1.4;
}
.bento-card.span-2 .bento-list a { font-size: 16px; }
.bento-list a:hover { color: var(--ink); transform: translateX(4px); }
.bento-list .caret { color: var(--gold); font-size: 10px; }
.bento-foot {
  margin-top: 24px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  transition: gap .3s var(--ease);
  align-self: flex-start;
}
.bento-foot:hover { gap: 18px; }
.bento-foot.pill {
  padding: 12px 22px;
  background: rgba(11,18,32,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid var(--line);
  border-radius: 999px;
}
.bento-foot.pill:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); }

/* Tech / Clarity 2 */
.tech-section {
  padding: 140px 0;
  background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
  border-top: 1px solid var(--line-soft);
  border-bottom: 1px solid var(--line-soft);
  position: relative;
  overflow: hidden;
}
.tech-grid {
  display: grid;
  grid-template-columns: 5fr 7fr;
  gap: 64px;
  align-items: center;
}
@media (max-width: 980px) { .tech-grid { grid-template-columns: 1fr; gap: 48px; } }
.tech-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 7px 16px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(199,160,55,0.05);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 32px;
}
.tech-pill .ping { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse-d 2s var(--ease) infinite; }
@keyframes pulse-d { 50% { opacity: 0.4; } }
.tech-section h2 { margin-bottom: 24px; }
.tech-divider { width: 64px; height: 1px; background: var(--gold); opacity: 0.5; margin: 28px 0; }
.tech-warning {
  margin-top: 32px;
  padding: 22px 24px;
  border-left: 2px solid var(--gold);
  background: rgba(199, 160, 55, 0.06);
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink-mute);
  border-radius: 0 6px 6px 0;
}
.video-mock {
  position: relative;
  aspect-ratio: 16/10;

function useReveal() {
  useEffect(() => {
    let io;
    const SEL = '.reveal, .reveal-stagger, .clip-img';

    const setup = () => {
      // Tag all targets as pending (hidden) before observing
      const els = document.querySelectorAll(SEL);
      els.forEach(el => {
        if (!el.classList.contains('in')) el.classList.add('pending');

      // Force layout, then observe on next frame so transitions/animations register cleanly
      requestAnimationFrame(() => {
        io = new IntersectionObserver((ents) => {
          ents.forEach(en => {
            if (en.isIntersecting) {
              en.target.classList.remove('pending');
              en.target.classList.add('in');
              io.unobserve(en.target);
            }
          });
        }, { threshold: 0.05, rootMargin: '0px 0px -3% 0px' });
        document.querySelectorAll(SEL).forEach(el => {
          if (!el.classList.contains('in')) io.observe(el);
        });
      });
    };

    // Run after React has mounted everything
    const t1 = setTimeout(setup, 50);

    // Watch for new nodes added later (centres/bento/gallery on first paint)
    const mo = new MutationObserver(() => {
      document.querySelectorAll(SEL).forEach(el => {
        if (!el.classList.contains('in') && !el.classList.contains('pending')) {
          el.classList.add('pending');
          if (io) io.observe(el);
        }
      });
    });
    mo.observe(document.body, { childList: true, subtree: true });

    // Safety net: anything still hidden after 1.5s gets revealed if in/near viewport
    const t2 = setTimeout(() => {
      document.querySelectorAll('.pending').forEach(el => {
        const r = el.getBoundingClientRect();
        if (r.top < innerHeight + 200) {
          el.classList.remove('pending');
          el.classList.add('in');
        }
      });
    }, 1500);

    return () => { clearTimeout(t1); clearTimeout(t2); mo.disconnect(); if (io) io.disconnect(); };
  }, []);
}

/* ─────────────────────────── CURSOR ─────────────────────────── */

function Cursor() {
  const dot = useRef(null), ring = useRef(null);
  useEffect(() => {
    let mx = innerWidth/2, my = innerHeight/2, rx = mx, ry = my, raf;
    const move = (ev) => {
      mx = ev.clientX; my = ev.clientY;
      if (dot.current) dot.current.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%)`;
    };
    const tick = () => {
      rx += (mx - rx) * 0.18; ry += (my - ry) * 0.18;
      if (ring.current) ring.current.style.transform = `translate(${rx}px,${ry}px) translate(-50%,-50%)`;
      raf = requestAnimationFrame(tick);
    };
    const over = (ev) => {
      const t = ev.target;
      const hover = t.closest && t.closest('a, button, .bento-card, .gallery-card, .play-btn, input, select, textarea, .partner');
      if (ring.current) ring.current.classList.toggle('hover', !!hover);
      if (dot.current) dot.current.classList.toggle('hover', !!hover);
    };
    addEventListener('mousemove', move);
    addEventListener('mouseover', over);
    tick();
    return () => { removeEventListener('mousemove', move); removeEventListener('mouseover', over); cancelAnimationFrame(raf); };
  }, []);
  return e(F, null,
    e('div', { ref: ring, className: 'cursor-ring' }),
    e('div', { ref: dot, className: 'cursor-dot' })
  );
}

/* ─────────────────────────── HERO BG ─────────────────────────── */

function HeroBG() {
  const c = useRef(null);
  useEffect(() => {
    const canvas = c.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf, w, h, parts = [];
    const DPR = Math.min(devicePixelRatio || 1, 2);
    function resize() {
      w = canvas.clientWidth; h = canvas.clientHeight;
      canvas.width = w * DPR; canvas.height = h * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    function init() {
      resize();
      const n = Math.floor((w*h)/24000);
      parts = Array.from({length:n}, () => ({
        x: Math.random()*w, y: Math.random()*h,
        r: Math.random()*1.6+0.3,
        vx: (Math.random()-0.5)*0.1, vy: -(Math.random()*0.18+0.04),
        a: Math.random()*0.55+0.15, pa: Math.random()*Math.PI*2, ps: Math.random()*0.012+0.004
      }));
    }
    function draw() {
      ctx.clearRect(0,0,w,h);
      parts.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.pa += p.ps;
        if (p.y < -10) { p.y = h+10; p.x = Math.random()*w; }
        if (p.x < -10) p.x = w+10; if (p.x > w+10) p.x = -10;
        const a = p.a * (0.55 + Math.sin(p.pa)*0.45);
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(232,199,122,${a})`; ctx.fill();
        if (p.r > 1) {
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r*4,0,Math.PI*2);
          ctx.fillStyle = `rgba(232,199,122,${a*0.08})`; ctx.fill();
        }
      });
      raf = requestAnimationFrame(draw);
    }
    init(); draw();
    const onR = () => init(); addEventListener('resize', onR);
    return () => { cancelAnimationFrame(raf); removeEventListener('resize', onR); };
  }, []);
  return e('canvas', { ref: c });
}

  const [step, setStep] = useState(0);
  const [data, setData] = useState({ centre: 'montpellier', soin: '', date: '', slot: '', name: '', email: '', phone: '', notes: '' });
  useEffect(() => {
    if (!open) return;
    const onKey = (ev) => { if (ev.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [open, onClose]);
  const slots = ["09:00","10:00","11:00","14:00","15:00","16:00","17:00","18:00"];
  const set = (k, v) => setData(d => ({...d, [k]: v}));

  const stepUI = step === 0 ? e(F, null,
    e('h3', null, 'Quel ', e('em', null, 'soin'), ' ?'),
    e('p', { className: 'modal-sub' }, 'Première consultation ou suivi — sélectionnez votre demande.'),
    e('div', { className: 'field' },
      e('label', null, 'Centre'),
      e('select', { value: data.centre, onChange: ev => set('centre', ev.target.value) },
        e('option', { value: 'montpellier' }, 'Montpellier — Écusson'),
        e('option', { value: 'uzes' }, 'Uzès — Duché')
      )
    ),
    e('div', { className: 'field' },
      e('label', null, 'Type de soin'),
      e('select', { value: data.soin, onChange: ev => set('soin', ev.target.value) },
        e('option', { value: '' }, '— Choisir —'),
        ['Première consultation','Lutronic Clarity 2 — Épilation','Injections esthétiques','Lasers médicaux','Soins du visage','Remodelage corporel']
          .map(s => e('option', { key: s }, s))
      )
    ),
    e('div', { style: { display: 'flex', justifyContent: 'flex-end', marginTop: 16 } },
      e('button', { className: 'btn btn-gold', onClick: () => setStep(1), disabled: !data.soin },
        'Continuer ', e('span', { className: 'btn-arrow' }))
    )
  ) : step === 1 ? e(F, null,
    e('h3', null, 'Quel ', e('em', null, 'créneau'), ' ?'),
    e('p', { className: 'modal-sub' }, 'Premières disponibilités — réajustables après confirmation.'),
    e('div', { className: 'field' },
      e('label', null, 'Date souhaitée'),
      e('input', { type: 'date', value: data.date, onChange: ev => set('date', ev.target.value) })
    ),
    e('div', { className: 'field' },
      e('label', null, 'Créneau'),
      e('div', { className: 'slot-grid' },
        slots.map(s => e('button', {
          key: s, className: 'slot' + (data.slot === s ? ' selected' : ''),
          onClick: () => set('slot', s)
        }, s))
      )
    ),
    e('div', { style: { display: 'flex', justifyContent: 'space-between', marginTop: 16 } },
      e('button', { className: 'btn btn-ghost', onClick: () => setStep(0) }, e('span', null, '← Retour')),
      e('button', { className: 'btn btn-gold', onClick: () => setStep(2), disabled: !data.date || !data.slot },
        'Continuer ', e('span', { className: 'btn-arrow' }))
    )
  ) : e(F, null,
    e('h3', null, 'Vos ', e('em', null, 'coordonnées')),
    e('p', { className: 'modal-sub' }, 'Nous vous confirmerons sous 24 heures ouvrées.'),
    e('div', { className: 'field-row' },
      e('div', { className: 'field' },
        e('label', null, 'Prénom & nom'),
        e('input', { value: data.name, onChange: ev => set('name', ev.target.value) })
      ),
      e('div', { className: 'field' },
        e('label', null, 'Téléphone'),
        e('input', { type: 'tel', value: data.phone, onChange: ev => set('phone', ev.target.value) })
      )
    ),
    e('div', { className: 'field' },
      e('label', null, 'Email'),
      e('input', { type: 'email', value: data.email, onChange: ev => set('email', ev.target.value) })
    ),
    e('div', { className: 'field' },
      e('label', null, 'Précisions (optionnel)'),
      e('textarea', { rows: 3, value: data.notes, onChange: ev => set('notes', ev.target.value) })
    ),
    e('div', { style: { display: 'flex', justifyContent: 'space-between', marginTop: 16 } },
      e('button', { className: 'btn btn-ghost', onClick: () => setStep(1) }, e('span', null, '← Retour')),
      e('button', { className: 'btn btn-gold',
        onClick: () => { alert('Demande envoyée — nous revenons vers vous sous 24h.'); onClose(); setStep(0); } },
        'Envoyer la demande ', e('span', { className: 'btn-arrow' }))
    )
  );

  return e('div', { className: 'modal-overlay' + (open ? ' open' : ''), onClick: onClose },
    e('div', { className: 'modal', onClick: ev => ev.stopPropagation() },
      e('button', { className: 'modal-close', onClick: onClose }, '✕'),
      e('div', { className: 'modal-step' },
        e('span', { className: step >= 0 ? 'active' : '' }, '01 Soin'),
        e('div', { className: 'bar' + (step >= 1 ? ' done' : '') }),
        e('span', { className: step >= 1 ? 'active' : '' }, '02 Créneau'),
        e('div', { className: 'bar' + (step >= 2 ? ' done' : '') }),
        e('span', { className: step >= 2 ? 'active' : '' }, '03 Coordonnées')
      ),
      stepUI
    )
  );
}

/* ─────────────────────────── TWEAKS ─────────────────────────── */

const GOLD_TONES = {
  warm:      { gold: "#C7A037", gold2: "#E8C77A", deep: "#8B7148" },
  champagne: { gold: "#D4B98A", gold2: "#F0DCAE", deep: "#9C8458" },
  cool:      { gold: "#B5A47E", gold2: "#D6C99B", deep: "#7A6E50" }
};
const BG_TONES = {
  navy:    { bg: "#0B1220", bg2: "#0F172A", bg3: "#141E36" },
  black:   { bg: "#0A0807", bg2: "#14100D", bg3: "#1C1714" },
  midnight:{ bg: "#0A0E1A", bg2: "#111626", bg3: "#1A2138" }
};

function TweaksPanel({ tweaks, setTweak, onBook }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    function onMsg(ev) {
      const d = ev.data; if (!d || !d.type) return;
      if (d.type === '__activate_edit_mode') setOpen(true);
      if (d.type === '__deactivate_edit_mode') setOpen(false);
    }
    addEventListener('message', onMsg);
    parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => removeEventListener('message', onMsg);
  }, []);
  if (!open) return null;
  const close = () => { setOpen(false); parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };

  return e('div', { className: 'twk' },
    e('div', { className: 'twk-hd' },
      e('b', null, 'Tweaks'),
      e('button', { className: 'twk-x', onClick: close }, '✕')
    ),
    e('div', { className: 'twk-body' },
      e('div', { className: 'twk-section' }, 'Direction'),
      e('div', { className: 'twk-row' },
        e('label', null, 'Or'),
        e('div', { className: 'twk-seg' },
          [['warm','Chaud'],['champagne','Champ.'],['cool','Bronze']].map(([v,l]) =>
            e('button', { key: v, className: tweaks.goldTone === v ? 'on' : '',
              onClick: () => setTweak('goldTone', v) }, l)
          )
        )
      ),
      e('div', { className: 'twk-row' },
        e('label', null, 'Fond'),
        e('div', { className: 'twk-seg' },
          [['navy','Marine'],['black','Noir'],['midnight','Midnight']].map(([v,l]) =>
            e('button', { key: v, className: tweaks.bgTone === v ? 'on' : '',
              onClick: () => setTweak('bgTone', v) }, l)
          )
        )
      ),
      e('div', { className: 'twk-section' }, 'Interactions'),
      e('div', { className: 'twk-row twk-h' },
        e('label', null, 'Curseur custom'),
        e('button', { className: 'twk-toggle' + (tweaks.cursor ? ' on' : ''),
          onClick: () => setTweak('cursor', !tweaks.cursor) })
      ),
      e('div', { className: 'twk-row twk-h' },
        e('label', null, 'Bandeau besoins'),
        e('button', { className: 'twk-toggle' + (tweaks.ticker ? ' on' : ''),
          onClick: () => setTweak('ticker', !tweaks.ticker) })
      ),
      e('div', { className: 'twk-section' }, 'Actions'),
      e('button', { className: 'twk-btn', onClick: onBook }, 'Ouvrir le RDV')
    )
  );
}

/* ─────────────────────────── APP ─────────────────────────── */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "goldTone": "warm",
  "bgTone": "navy",
  "cursor": true,
  "ticker": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [open, setOpen] = useState(false);
  useReveal();

  useEffect(() => {
    const tone = GOLD_TONES[tweaks.goldTone] || GOLD_TONES.warm;
    const bg = BG_TONES[tweaks.bgTone] || BG_TONES.navy;
    const r = document.documentElement.style;
    r.setProperty('--gold', tone.gold);
    r.setProperty('--gold-2', tone.gold2);
    r.setProperty('--gold-deep', tone.deep);
    r.setProperty('--bg', bg.bg);
    r.setProperty('--bg-2', bg.bg2);
    r.setProperty('--bg-3', bg.bg3);
    r.setProperty('--line', `rgba(${parseInt(tone.gold.slice(1,3),16)}, ${parseInt(tone.gold.slice(3,5),16)}, ${parseInt(tone.gold.slice(5,7),16)}, 0.22)`);
    document.body.style.cursor = tweaks.cursor ? 'none' : 'auto';
  }, [tweaks.goldTone, tweaks.bgTone, tweaks.cursor]);

  const setTweak = (k, v) => {
    setTweaks(t => ({...t, [k]: v}));
    parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  const openModal = () => setOpen(true);

  return e(F, null,
    tweaks.cursor && e(Cursor),
    tweaks.ticker && e(TopTicker),
    e(Nav, { onBook: openModal }),
    e(Hero, { onBook: openModal }),
    e(Centres),
    e(Soins),
    e(Tech),
    e(Partners),
    e(Doctor),
    e(Gallery),
    e(CtaFinal, { onBook: openModal }),
    e(Footer),
    e(Modal, { open, onClose: () => setOpen(false) }),
    e(TweaksPanel, { tweaks, setTweak, onBook: openModal })
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(e(App));
  </script>
</body>
</html>
